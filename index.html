<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunner Runners</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #2a2a2a;
        }

        header h2 {
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin: 0 12px;
            transition: 0.2s;
        }

        nav a:hover {
            color: #00e5ff;
            text-shadow: 0 0 8px #00e5ff;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .menu {
            text-align: center;
            max-width: 700px;
        }

        .menu h1 {
            font-size: 3.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .menu p {
            color: #bbb;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .card:hover {
            border-color: #00e5ff;
            box-shadow: 0 0 12px #00e5ff33;
            transform: translateY(-4px);
        }

        .card h3 {
            margin-bottom: 8px;
            color: #00e5ff;
            letter-spacing: 1px;
        }

        .card span {
            font-size: 0.9rem;
            color: #aaa;
        }

        footer {
            background: rgba(20, 20, 20, 0.95);
            text-align: center;
            padding: 15px;
            border-top: 2px solid #2a2a2a;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

<body>

    <header>
        <h2>GUNNER RUNNERS</h2>
        <nav>
            <a href="index.html">HOME</a>
            <a href="team.html">MEET THE TEAM</a>
            <a href="shop.html">SHOP</a>
            <a href="streaming.html">STREAMING TIMES</a>
        </nav>
    </header>

    <main>
        <div class="menu">
            <h1>🎮 MAIN MENU</h1>
            <p>Select an option to deploy into the system</p>

            <div class="menu-grid">

                <a class="card" href="team.html">
                    <h3>TEAM</h3>
                    <span>View squad roster</span>
                </a>

                <a class="card" href="shop.html">
                    <h3>SHOP</h3>
                    <span>Armory & items</span>
                </a>

                <a class="card" href="streaming.html">
                    <h3>STREAM</h3>
                    <span>Broadcast schedule</span>
                </a>

                <a class="card" href="#">
                    <h3>ABOUT</h3>
                    <span>Game info & lore</span>
                </a>

            </div>
        </div>
    </main>

    <footer>
        © 2026 Gunner Runners // MAIN HUB ONLINE
    </footer>

</body>
</html>
