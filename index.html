<!DOCTYPE html>

    <style>
        * {

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(20, 20, 20, 0.95);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #2a2a2a;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        header h2 {
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #aaa;

            margin: 0 12px;

        nav a:hover {
            color: #00e5ff;
            text-shadow: 0 0 8px #00e5ff;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .placeholder {
            max-width: 650px;
            border: 1px solid #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        .placeholder h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .placeholder p {
            font-size: 1.1rem;
            color: #bbb;
            line-height: 1.5;
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        footer {
            background: rgba(20, 20, 20, 0.95);
            text-align: center;
            padding: 15px;
            border-top: 2px solid #2a2a2a;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

    <header>
        <h2>GUNNER RUNNERS</h2>
        <nav>
